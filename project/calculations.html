<main>


    <h2>Cálculos Simples</h2>

    <div class="calculation">
    <form class="calc-form" id="calc-form">

        <select id="calc-type">
            <option value="">-- Escolha um cálculo --</option>
            <option value="area">Área (Retângulo)</option>
            <option value="perimeter">Perímetro (Retângulo)</option>
            <option value="rectangle">Retângulo: Área e Perímetro</option>
            <option value="square">Quadrado: Área e Perímetro</option>
            <option value="triangle">Triângulo: Área</option>
            <option value="circle">Círculo: Área e Circunferência</option>
            <option value="volume">Volume</option>
        </select>

        <label for="unit">Unidade:</label>
        <select id="unit">
            <option value="m">Metros</option>
            <option value="cm">Centímetros</option>
        </select>


        <div id="input-fields"></div>

        <!-- Botão de calcular -->
        <button type="button" id="calculate-btn">Calcular</button>

        <!-- Resultado -->
        <p id="result" class="calc-result"></p>

    </form>
    </div>
